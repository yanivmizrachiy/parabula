<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parabula — Reader</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet" />

    <script>
      MathJax = { tex: { inlineMath: [["\\(", "\\)"]] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="/styles/a4-base.css" />
    <link rel="stylesheet" href="/styles/preview.css" />
</head>
  <body>
    <div class="reader-shell">
      <header class="reader-topbar">
        <div class="reader-topbarRow">
          <div class="reader-title" id="readerTitle">תצוגה מקדימה — כל הדפים</div>

          <div class="reader-controls">
            <div class="reader-modes" role="group" aria-label="מצב תצוגה">
              <button class="reader-btn" id="modeAllBtn" type="button">כל הדפים</button>
              <button class="reader-btn" id="modeBookBtn" type="button">דפדוף</button>
            </div>

            <button class="reader-btn reader-navBtn" id="prevBtn" type="button">◀ הקודם</button>
            <select class="reader-select" id="fileSelect" aria-label="בחירת מסמך"></select>
            <button class="reader-btn reader-navBtn" id="nextBtn" type="button">הבא ▶</button>
          </div>

          <div class="reader-meta" id="meta"></div>
        </div>

        <nav class="reader-topics" id="topicButtons" aria-label="מעבר בין נושאים"></nav>
      </header>

      <main class="reader-main">
        <aside class="reader-sidebar" aria-label="תוכן עניינים">
          <div class="reader-sidebar-title">תוכן עניינים</div>
          <div class="reader-list" id="fileList"></div>
        </aside>

        <section class="reader-stage" aria-label="תצוגה">
          <div class="reader-fallback" id="readerFallback" role="status">
            טוען…
          </div>
          <div class="reader-frameWrap" id="frameWrap">
            <div class="reader-book" id="book" aria-label="ספר" hidden>
              <div class="reader-leaf reader-leaf--right" aria-label="עמוד ימין">
                <div class="reader-pageHost" id="pageRight" aria-label="תצוגה מקדימה — ימין"></div>
              </div>

              <div class="reader-gutter" aria-hidden="true"></div>

              <div class="reader-leaf reader-leaf--left" aria-label="עמוד שמאל">
                <div class="reader-pageHost" id="pageLeft" aria-label="תצוגה מקדימה — שמאל"></div>
                <div class="reader-empty" id="emptyLeft" hidden></div>
              </div>
            </div>

            <div class="reader-all" id="allPages" aria-label="כל הדפים"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="reader-diag" id="diagOverlay" role="status" aria-live="polite" hidden></div>

    <script type="module">
      const fileSelect = document.getElementById('fileSelect');
      const fileList = document.getElementById('fileList');
      const pageRight = document.getElementById('pageRight');
      const pageLeft = document.getElementById('pageLeft');
      const emptyLeft = document.getElementById('emptyLeft');
      const meta = document.getElementById('meta');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const frameWrap = document.getElementById('frameWrap');
      const readerTitle = document.getElementById('readerTitle');
      const modeAllBtn = document.getElementById('modeAllBtn');
      const modeBookBtn = document.getElementById('modeBookBtn');
      const book = document.getElementById('book');
      const allPages = document.getElementById('allPages');
      const topicButtons = document.getElementById('topicButtons');
      const readerFallback = document.getElementById('readerFallback');
      const diagOverlay = document.getElementById('diagOverlay');

      const topbar = document.querySelector('.reader-topbar');

      function syncTopbarOffset() {
        if (!topbar) return;
        const h = Math.max(0, Math.ceil(topbar.getBoundingClientRect().height || 0));
        document.documentElement.style.setProperty('--reader-topbar-h', `${h}px`);
      }

      try {
        if (topbar && 'ResizeObserver' in window) {
          const ro = new ResizeObserver(() => syncTopbarOffset());
          ro.observe(topbar);
        }
      } catch {
        // ignore
      }

      window.addEventListener('resize', () => syncTopbarOffset());

      /** @type {{topics: {name: string, pages: any[]}[], flat: any[]}} */
      /** @type {{topics: {name: string, pages: any[]}[], flat: any[], buttonTopics?: {name: string, firstFile: string}[]}} */
      let toc = { topics: [], flat: [], buttonTopics: [] };

      /** @type {Map<string, HTMLIFrameElement>} */
      let allFrames = new Map();

      /** @type {Map<string, HTMLElement>} */
      let allItems = new Map();

      /** @type {IntersectionObserver | null} */
      let allIo = null;

      /** @type {Set<HTMLIFrameElement>} */
      let allLoaded = new Set();

      let currentMode = 'all';

      /** @type {Map<string, boolean>} */
      const lastOverflowByFile = new Map();

      // Preview-only diagnostics (non-invasive, toggleable)
      function getDiagConfig() {
        const url = new URL(window.location.href);
        const diag = (url.searchParams.get('diag') || '').toLowerCase();
        const overlay = (url.searchParams.get('diagOverlay') || '').toLowerCase();

        // Defaults:
        // - diagnostics enabled (console) unless diag=0
        // - overlay disabled unless diagOverlay=1
        const enabled = diag !== '0' && diag !== 'false' && diag !== 'off';
        const overlayEnabled = overlay === '1' || overlay === 'true' || overlay === 'on';
        return { enabled, overlayEnabled };
      }

      const diagConfig = getDiagConfig();

      /** @type {Map<string, {file: string, ok: boolean, overflow: boolean, missingTitle: boolean, missingNumber: boolean, gridOff: number}>} */
      const diagByFile = new Map();

      /** @type {number | null} */
      let diagFlushTimer = null;

      let lastDiagSummary = '';

      function asPxNumber(v) {
        if (!v) return null;
        const s = String(v).trim().toLowerCase();
        if (s === 'auto') return null;
        if (!s.endsWith('px')) return null;
        const n = Number(s.slice(0, -2));
        return Number.isFinite(n) ? n : null;
      }

      function nearGrid(valuePx, gridSizePx, tolerancePx = 0.75) {
        if (!Number.isFinite(valuePx)) return true;
        const m = ((valuePx % gridSizePx) + gridSizePx) % gridSizePx;
        return m <= tolerancePx || Math.abs(m - gridSizePx) <= tolerancePx;
      }

      function countOffGridAbsoluteChildren(gridRootEl) {
        if (!gridRootEl) return 0;
        const gridSize = 22;

        // Only inspect absolutely-positioned descendants where left/top are explicit px.
        // Exclusions: axis and axis labels intentionally use percentages/calc.
        const excluded = new Set(['axis', 'axis-x', 'axis-y', 'axis-label', 'label-x', 'label-y']);
        let off = 0;

        const all = Array.from(gridRootEl.querySelectorAll('*'));
        for (const el of all) {
          const cls = String(el.className || '');
          if (cls && cls.split(/\s+/).some((c) => excluded.has(c))) continue;

          const cs = window.getComputedStyle(el);
          if (cs.position !== 'absolute') continue;

          const left = asPxNumber(cs.left);
          const top = asPxNumber(cs.top);
          if (left == null && top == null) continue;

          const leftOk = left == null ? true : nearGrid(left, gridSize);
          const topOk = top == null ? true : nearGrid(top, gridSize);
          if (!leftOk || !topOk) off++;
        }

        return off;
      }

      function diagnosePageEl(file, pageEl) {
        const hasTitle = Boolean(pageEl?.querySelector?.('.page-title'));
        const hasNumber = Boolean(pageEl?.querySelector?.('.page-number'));

        const m = measureOverflowFromPageEl(pageEl);
        const overflow = Boolean(m.overflow);

        let gridOff = 0;
        if (pageEl) {
          for (const gridRoot of Array.from(pageEl.querySelectorAll('.coordinate-system'))) {
            gridOff += countOffGridAbsoluteChildren(gridRoot);
          }
        }

        const missingTitle = !hasTitle;
        const missingNumber = !hasNumber;
        const ok = !overflow && !missingTitle && !missingNumber && gridOff === 0;
        return { file, ok, overflow, missingTitle, missingNumber, gridOff };
      }

      function upsertDiag(result) {
        if (!diagConfig.enabled) return;
        if (!result || !result.file) return;
        diagByFile.set(result.file, result);

        if (diagFlushTimer != null) window.clearTimeout(diagFlushTimer);
        diagFlushTimer = window.setTimeout(flushDiagReport, 150);
      }

      function flushDiagReport() {
        diagFlushTimer = null;
        if (!diagConfig.enabled) return;

        const total = toc?.flat?.length || 0;
        const done = diagByFile.size;

        let okCount = 0;
        let overflowCount = 0;
        let missingCount = 0;
        let gridCount = 0;

        /** @type {string[]} */
        const badFiles = [];

        for (const r of diagByFile.values()) {
          if (r.ok) okCount++;
          if (r.overflow) overflowCount++;
          if (r.missingTitle || r.missingNumber) missingCount++;
          if (r.gridOff > 0) gridCount++;
          if (!r.ok) badFiles.push(r.file);
        }

        const badCount = done - okCount;
        const summary = `[preview:diag] checked ${done}/${total} • ok=${okCount} • issues=${badCount} (A4=${overflowCount}, missing=${missingCount}, grid=${gridCount})`;
        if (summary !== lastDiagSummary) {
          console.info(summary);
          lastDiagSummary = summary;
        }

        if (badFiles.length > 0) {
          const sample = badFiles.slice(0, 8);
          console.warn(
            `[preview:diag] files with issues (sample): ${sample.join(', ')}${badFiles.length > sample.length ? ' …' : ''}`
          );
        }

        if (diagOverlay) {
          if (diagConfig.overlayEnabled) {
            diagOverlay.hidden = false;
            diagOverlay.textContent = `בדיקת Preview: ${okCount}/${done} תקינים • חריגות: ${badCount} • A4: ${overflowCount} • Grid: ${gridCount} • חסר כותרת/מס׳: ${missingCount}`;
          } else {
            diagOverlay.hidden = true;
          }
        }
      }

      function extractFileName(file) {
        const f = String(file || '').trim();
        if (!f) return '';
        return f.replace(/^\/+/, '').split('?')[0];
      }

      async function reportLayoutGuard(
        file,
        overflow,
        scrollHeight,
        clientHeight,
        scrollWidth = 0,
        clientWidth = 0,
        overflowX = false,
        overflowY = false
      ) {
        const key = extractFileName(file);
        if (!key) return;

        const prev = lastOverflowByFile.get(key);
        if (prev === overflow) return;
        lastOverflowByFile.set(key, overflow);

        try {
          await fetch('/api/layout-guard', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              file: key,
              overflow: Boolean(overflow),
              overflowX: Boolean(overflowX),
              overflowY: Boolean(overflowY),
              scrollHeight: Number(scrollHeight || 0),
              clientHeight: Number(clientHeight || 0),
              scrollWidth: Number(scrollWidth || 0),
              clientWidth: Number(clientWidth || 0),
              ts: Date.now()
            })
          });
        } catch {
          // ignore network errors
        }
      }

      function nextFrame() {
        return new Promise((r) => window.requestAnimationFrame(() => r()));
      }

      async function reportLayoutGuardStable(file, pageEl) {
        if (!file || !pageEl) return;

        // Let injected styles/fonts settle before measuring.
        await nextFrame();
        await nextFrame();

        try {
          const fonts = document?.fonts;
          if (fonts && typeof fonts.ready?.then === 'function') {
            await Promise.race([
              fonts.ready.catch(() => undefined),
              sleep(250)
            ]);
          }
        } catch {
          // ignore
        }

        const first = measureOverflowFromPageEl(pageEl);

        // Guard against transient false positives during late CSS / MathJax reflow.
        if (first.overflow) {
          await sleep(120);
          const second = measureOverflowFromPageEl(pageEl);
          await reportLayoutGuard(
            file,
            second.overflow,
            second.scrollHeight,
            second.clientHeight,
            second.scrollWidth,
            second.clientWidth,
            second.overflowX,
            second.overflowY
          );
          return;
        }

        await reportLayoutGuard(
          file,
          false,
          first.scrollHeight,
          first.clientHeight,
          first.scrollWidth,
          first.clientWidth,
          first.overflowX,
          first.overflowY
        );
      }

      function measureOverflowFromPageEl(pageEl) {
        if (!pageEl) {
          return {
            overflow: false,
            overflowY: false,
            overflowX: false,
            scrollHeight: 0,
            clientHeight: 0,
            scrollWidth: 0,
            clientWidth: 0
          };
        }

        const clientHeight = pageEl.clientHeight;
        const scrollHeight = pageEl.scrollHeight;
        const clientWidth = pageEl.clientWidth;
        const scrollWidth = pageEl.scrollWidth;

        const overflowY = scrollHeight > clientHeight + 1;
        const overflowX = scrollWidth > clientWidth + 1;
        const overflow = overflowY || overflowX;

        return { overflow, overflowY, overflowX, scrollHeight, clientHeight, scrollWidth, clientWidth };
      }

      /** @type {Map<string, HTMLButtonElement>} */
      let topicButtonsMap = new Map();

      function showFallback(message, details = '') {
        if (!readerFallback) return;
        const text = [message, details].filter(Boolean).join('\n');
        readerFallback.textContent = text;
        readerFallback.hidden = false;
      }

      function hideFallback() {
        if (!readerFallback) return;
        readerFallback.hidden = true;
      }

      // If the environment blocks module scripts, fetch, or iframes (can happen in VS Code Simple Browser),
      // we still want a visible message rather than a blank screen.
      window.addEventListener('error', (e) => {
        const msg = String(e?.message || '');
        // Chrome can emit benign ResizeObserver loop errors during layout thrash; they don't mean the reader is broken.
        if (/resizeobserver loop/i.test(msg)) return;
        showFallback('שגיאה בתצוגה המקדימה.', msg);
      });
      window.addEventListener('unhandledrejection', (e) => {
        const reason = e?.reason instanceof Error ? e.reason.message : String(e?.reason || '');
        showFallback('שגיאה בתצוגה המקדימה.', reason);
      });

      function getMode() {
        const url = new URL(window.location.href);
        const raw = url.searchParams.get('mode');
        // Rules (SSOT): /preview defaults to "all pages" mode.
        if (!raw) return 'all';
        const mode = String(raw).toLowerCase();
        return mode === 'all' ? 'all' : 'book';
      }

      function setMode(mode) {
        const url = new URL(window.location.href);
        url.searchParams.set('mode', mode);
        window.history.replaceState({}, '', url);
      }

      function getSelectedFile() {
        const url = new URL(window.location.href);
        return url.searchParams.get('file') || '';
      }

      function setSelectedFile(file) {
        const url = new URL(window.location.href);
        url.searchParams.set('file', file);
        window.history.replaceState({}, '', url);

        try {
          window.localStorage.setItem('reader:lastFile', file);
        } catch {
          // ignore
        }
      }

      function findEntry(file) {
        return toc.flat.find((p) => p.file === file) || null;
      }

      function labelForEntry(entry) {
        if (!entry) return '';
        if (entry.topic && typeof entry.pageIndex === 'number' && typeof entry.pageTotal === 'number') {
          return `${entry.topic} — עמוד ${entry.pageIndex} / ${entry.pageTotal}`;
        }
        return entry.title || entry.file;
      }

      function findIndex(file) {
        return toc.flat.findIndex((p) => p.file === file);
      }

      function spreadStartIndexForFile(file) {
        // In book mode we show a single page at a time.
        const idx = findIndex(file);
        if (idx < 0) return 0;
        return idx;
      }

      function spreadFiles(startIdx) {
        const right = toc.flat[startIdx] || null;
        return { right, left: null };
      }

      function describeSpread(right, left) {
        if (!right) return '';
        if (right.topic && left && left.topic && right.topic === left.topic) {
          const a = typeof right.pageIndex === 'number' ? right.pageIndex : null;
          const b = typeof left.pageIndex === 'number' ? left.pageIndex : null;
          const total = typeof right.pageTotal === 'number' ? right.pageTotal : null;
          if (a && b && total) return `${right.topic} — עמודים ${a}–${b} / ${total}`;
        }

        const r = labelForEntry(right);
        const l = left ? labelForEntry(left) : '';
        return l ? `${r} | ${l}` : r;
      }

      /** @type {number} */
      let spreadRenderSeq = 0;
      /** @type {AbortController | null} */
      let spreadAbortRight = null;
      /** @type {AbortController | null} */
      let spreadAbortLeft = null;

      async function updateSpread(startIdx, reason) {
        const seq = ++spreadRenderSeq;

        try {
          spreadAbortRight?.abort();
        } catch {
          // ignore
        }
        try {
          spreadAbortLeft?.abort();
        } catch {
          // ignore
        }

        spreadAbortRight = new AbortController();
        spreadAbortLeft = new AbortController();

        const { right } = spreadFiles(startIdx);
        if (!right) return;

        meta.textContent = `${labelForEntry(right)}${reason ? ' • ' + reason : ''}`;

        const okRight = await renderPageIntoHost(right.file, pageRight, spreadAbortRight.signal);
        if (seq !== spreadRenderSeq) return;
        if (okRight) {
          fitA4InHost(pageRight);
          // Fonts / MathJax can settle slightly later; re-fit once (best-effort).
          window.setTimeout(() => {
            if (seq !== spreadRenderSeq) return;
            try {
              fitA4InHost(pageRight);
            } catch {
              // ignore
            }
          }, 250);
        }
        if (diagConfig.enabled && okRight) {
          try {
            const pageEl = pageRight?.querySelector?.('main.a4-page') || pageRight?.querySelector?.('.a4-page');
            upsertDiag(diagnosePageEl(right.file, pageEl));
          } catch {
            // ignore
          }
        }

        // Single-page book mode: never render a left page.
        pageLeft.innerHTML = '';
        pageLeft.hidden = true;
        emptyLeft.hidden = true;
      }

      /** @type {Set<string>} */
      const injectedStyles = new Set();

      function normalizeHref(href) {
        const h = String(href || '').trim();
        if (!h) return '';
        if (h.startsWith('http://') || h.startsWith('https://')) return h;
        if (h.startsWith('/')) return h;
        return '/' + h.replace(/^\.+\//, '');
      }

      function ensureStylesheet(href) {
        const normalized = normalizeHref(href);
        if (!normalized) return;
        if (injectedStyles.has(normalized)) return;
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = normalized;
        document.head.appendChild(link);
        injectedStyles.add(normalized);
      }

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      async function ensureMathJaxReady(timeoutMs = 3000) {
        const started = Date.now();
        while (Date.now() - started < timeoutMs) {
          if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') return true;
          await sleep(50);
        }
        return false;
      }

      function encodeUrlPath(relPath) {
        const raw = String(relPath || '').replace(/\\/g, '/').replace(/^\/+/, '');
        const parts = raw.split('/').filter(Boolean);
        return parts.map((p) => encodeURIComponent(p)).join('/');
      }

      function resolveAssetHref(file, href) {
        const h = String(href || '').trim();
        if (!h) return '';
        if (h.startsWith('http://') || h.startsWith('https://')) return h;
        if (h.startsWith('/')) return h;

        const filePath = '/' + encodeUrlPath(file);
        const baseDir = filePath.replace(/[^/]*$/, '');

        try {
          const u = new URL(h, window.location.origin + baseDir);
          return u.pathname + u.search;
        } catch {
          // Last resort: behave like normalizeHref() used to.
          return '/' + h.replace(/^\.+\//, '');
        }
      }

      async function renderPageIntoHost(file, hostEl, abortSignal) {
        if (!file || !hostEl) return false;

        hostEl.innerHTML = '';

        let html = '';
        try {
          const res = await fetch(`/${encodeUrlPath(file)}`, { cache: 'no-store', signal: abortSignal });
          if (!res.ok) {
            hostEl.textContent = `שגיאה בטעינת העמוד (${res.status})`;
            return false;
          }
          html = await res.text();
        } catch (err) {
          if (err && typeof err === 'object' && 'name' in err && err.name === 'AbortError') {
            return false;
          }
          hostEl.textContent = 'שגיאה בטעינת העמוד.';
          return false;
        }

        const parsed = new DOMParser().parseFromString(html, 'text/html');

        const main = parsed.querySelector('main.a4-page');
        if (main) {
          // Load page styles (base + page-specific). We keep /styles/preview.css separate.
          // IMPORTANT: resolve relative hrefs against the *page file* path (not /preview's <base href="/">).
          for (const link of parsed.querySelectorAll('link[rel="stylesheet"][href]')) {
            const href = link.getAttribute('href') || '';
            ensureStylesheet(resolveAssetHref(file, href));
          }

          hostEl.appendChild(main);

          // Render math (best-effort).
          const ready = await ensureMathJaxReady();
          if (ready) {
            try {
              await window.MathJax.typesetPromise([hostEl]);
            } catch {
              // ignore typeset failures
            }
          }

          // Layout guard: detect A4 overflow and report to server (terminal).
          try {
            const pageEl = hostEl.querySelector('.a4-page');
            await reportLayoutGuardStable(file, pageEl);
          } catch {
            // ignore measurement errors
          }

          return true;
        }

        // Fallback for non-A4 pages (e.g., built topic pages under site/): use an iframe.
        const frame = document.createElement('iframe');
        frame.className = 'reader-hostFrame';
        frame.title = String(file);
        frame.referrerPolicy = 'no-referrer';
        frame.loading = 'eager';
        const bust = String(Date.now());
        frame.src = `/${encodeUrlPath(file)}?v=${bust}`;
        hostEl.appendChild(frame);

        frame.addEventListener(
          'load',
          () => {
            fitA4InFrame(frame, 'book');
            maybeWarnIframeBlocked(frame);
          },
          { once: true }
        );

        return true;
      }

      function fitA4InHost(hostEl) {
        const page = hostEl?.querySelector?.('.a4-page');
        if (!page) return;

        // Reset any previous scaling and force a reflow so measurements are stable.
        page.style.zoom = '';
        page.style.transform = '';
        page.style.transformOrigin = '';
        // eslint-disable-next-line no-unused-expressions
        page.offsetWidth;

        // Robust height-first scaling engine (fixed A4 pixel height at 96dpi).
        // Spec:
        //   availH = window.innerHeight - 100
        //   scale = availH / 1123
        //   scale >= 0.6
        const availH = Math.max(0, window.innerHeight - 100);
        let scale = availH / 1123;
        if (!Number.isFinite(scale) || scale <= 0) return;
        if (scale < 0.6) scale = 0.6;

        page.style.transformOrigin = 'top center';
        page.style.transform = `scale(${scale})`;
      }

      function maybeWarnIframeBlocked(frameEl) {
        // After load, we expect to have an accessible document with an .a4-page.
        // If not, show a helpful fallback including a direct page link.
        try {
          const doc = frameEl.contentDocument;
          const hasPage = !!doc?.querySelector?.('.a4-page, .page');
          if (hasPage) return;
        } catch {
          // ignore
        }

        const selected = getSelectedFile();
        const direct = selected ? `/${encodeUrlPath(selected)}` : '/';
        showFallback(
          'נראה שהחלון הפנימי חוסם הצגת מסמכים בתוך iframe.',
          `פתח את העמוד ישירות: ${direct}`
        );
      }

      function injectReaderStyles(doc) {
        if (!doc) return;
        const existing = doc.getElementById('__reader_injected');
        if (existing) return;

        const style = doc.createElement('style');
        style.id = '__reader_injected';
        style.textContent = `
          .preview-nav { display: none !important; }
          html, body { background: var(--bg-paper) !important; display: block !important; }
          body { margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
          .a4-page { margin: 0 !important; margin-bottom: 0 !important; box-shadow: inset 0 0 0 1px var(--border-light) !important; }
          /* Built topic pages under site/ use .page and already draw an A4 outline in their own CSS.
             Keep that outline visible to match the preview rules (A4 boundary always shown). */
          .page { margin: 0 !important; }
        `;
        doc.head.appendChild(style);
      }

      function fitA4InFrame(frameEl, mode = 'book') {
        try {
          const doc = frameEl.contentDocument;
          if (!doc) return;
          injectReaderStyles(doc);

          const page = doc.querySelector('.a4-page') || doc.querySelector('.page');
          if (!page) return;

          // Layout guard in iframe mode.
          try {
            const srcBase = frameEl.dataset.src || '';
            const m = measureOverflowFromPageEl(page);
            reportLayoutGuard(
              srcBase,
              m.overflow,
              m.scrollHeight,
              m.clientHeight,
              m.scrollWidth,
              m.clientWidth,
              m.overflowX,
              m.overflowY
            );
          } catch {
            // ignore
          }

          // Reset any previous scaling.
          page.style.zoom = '';
          page.style.transform = '';
          page.style.transformOrigin = '';

          const pageRect = page.getBoundingClientRect();
          const availW = frameEl.clientWidth;
          const availH = frameEl.clientHeight;
          if (availW <= 0 || availH <= 0 || pageRect.width <= 0 || pageRect.height <= 0) return;

          // Allow upscaling in preview so the page can actually fill the available space.
          // Cap to avoid absurd zoom on very large viewports.
          const maxScale = 2.5;
          const scaleRaw =
            mode === 'all'
              ? availW / pageRect.width
              : Math.min(availW / pageRect.width, availH / pageRect.height);
          const scale = Math.min(scaleRaw, maxScale);

          // Prefer `zoom` (stable in Chromium) to avoid transform layout issues.
          page.style.zoom = String(scale);

          if (mode === 'all') {
            const desiredH = Math.ceil(pageRect.height * scale + 2);
            if (Number.isFinite(desiredH) && desiredH > 0) frameEl.style.height = `${desiredH}px`;
          }
        } catch {
          // Ignore cross-origin / transient iframe loading states.
        }
      }

      function setModeUi(mode) {
        currentMode = mode;
        const isAll = mode === 'all';

        document.body.dataset.mode = mode;

        book.hidden = isAll;
        allPages.hidden = !isAll;

        // Keep navigation buttons always visible.
        prevBtn.hidden = false;
        nextBtn.hidden = false;

        modeAllBtn.classList.toggle('is-active', isAll);
        modeBookBtn.classList.toggle('is-active', !isAll);

        if (readerTitle) readerTitle.textContent = isAll ? 'תצוגה מקדימה — כל הדפים' : 'תצוגה מקדימה — דפדוף';

        // Topbar height can change when controls wrap.
        syncTopbarOffset();
      }

      function updatePrevNextDisabled() {
        const current = getSelectedFile();
        if (!current || toc.flat.length === 0) {
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          return;
        }

        if (currentMode === 'all') {
          const idx = findIndex(current);
          prevBtn.disabled = idx <= 0;
          nextBtn.disabled = idx < 0 || idx >= toc.flat.length - 1;
          return;
        }

        const idx = findIndex(current);
        prevBtn.disabled = idx <= 0;
        nextBtn.disabled = idx < 0 || idx >= toc.flat.length - 1;
      }

      async function selectNeighbor(delta) {
        const current = getSelectedFile();
        if (!current) return;

        if (currentMode === 'all') {
          const idx = findIndex(current);
          if (idx < 0) return;
          const nextFile = toc.flat[idx + delta]?.file || '';
          if (!nextFile) return;
          await openFileInCurrentMode(nextFile, 'ניווט');
          setActiveTopicButtons(nextFile);
          return;
        }

        await selectNeighborSpread(delta);
      }

      function updateMetaAll(selectedFile, reason) {
        const entry = findEntry(selectedFile);
        const label = entry ? labelForEntry(entry) : selectedFile || '';
        const base = `כל הדפים — ${toc.flat.length} דפים`;
        const tail = label ? ` • ${label}` : '';
        meta.textContent = `${base}${tail}${reason ? ' • ' + reason : ''}`;
      }

      function setActiveTopicButtons(selectedFile) {
        const entry = findEntry(selectedFile);
        const activeTopic = entry ? entry.topic || 'אחר' : '';
        for (const [topicName, btn] of topicButtonsMap.entries()) {
          btn.classList.toggle('is-active', topicName === activeTopic);
          if (topicName === activeTopic) btn.setAttribute('aria-current', 'true');
          else btn.removeAttribute('aria-current');
        }
      }

      async function openFileInCurrentMode(file, reason) {
        if (!file) return;
        if (currentMode === 'all') {
          setSelectedFile(file);
          fileSelect.value = file;
          renderList(file);
          highlightAllSelected(file);
          loadAllFrame(file);
          scrollToAllSelected(file);
          updateMetaAll(file, reason);
        } else {
          const idx = spreadStartIndexForFile(file);
          const r = toc.flat[idx]?.file || file;
          setSelectedFile(r);
          fileSelect.value = r;
          renderList(r);
          showFallback('טוען…');
          await updateSpread(idx, reason);
          hideFallback();
          setActiveTopicButtons(r);
        }
      }

      function buildTopicButtons() {
        if (!topicButtons) return;
        topicButtons.innerHTML = '';
        topicButtonsMap = new Map();

        // Prefer server-provided canonical topic buttons (derived from root A4 nav-meta pages only).
        const buttonTopics = Array.isArray(toc.buttonTopics) && toc.buttonTopics.length ? toc.buttonTopics : [];
        const fallbackTopics = !buttonTopics.length ? toc.topics : [];

        const items = buttonTopics.length
          ? buttonTopics.map((t) => ({ name: t?.name || '', firstFile: t?.firstFile || '' }))
          : fallbackTopics.map((t) => ({ name: t?.name || '', firstFile: t?.pages?.[0]?.file || '' }));

        for (const item of items) {
          const name = String(item?.name || '').trim();
          const firstFileRaw = String(item?.firstFile || '').trim();
          if (!name || !firstFileRaw) continue;
          if (name === 'אחר') continue;
          if (/\bredirect\b/iu.test(name)) continue;

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'reader-btn reader-topicBtn';
          btn.textContent = name;

          btn.addEventListener('click', async () => {
            // Robust filename normalization for Hebrew/Unicode paths.
            // Use encodeURIComponent as requested, but keep a raw file key for TOC matching.
            let firstFile = firstFileRaw;
            try {
              firstFile = decodeURIComponent(encodeURIComponent(firstFileRaw));
            } catch {
              firstFile = firstFileRaw;
            }

            // Ensure we always navigate to the first page of that topic sequence.
            const entry = toc.flat.find((p) => p.topic === name) || toc.flat.find((p) => p.file === firstFile) || null;
            const fileToOpen = entry?.file || firstFile;

            // UX: Built topic pages under site/ render via iframe fallback.
            // In ALL mode this becomes an "expanded" scroll of many iframes.
            // For topics like "גרף עולה/יורד" we prefer a single-page Book view.
            if (currentMode === 'all' && String(fileToOpen).replace(/\\/g, '/').startsWith('site/')) {
              setMode('book');
              setModeUi('book');
            }

            await openFileInCurrentMode(fileToOpen, 'נושא');
            setActiveTopicButtons(getSelectedFile() || fileToOpen);
          });

          topicButtons.appendChild(btn);
          topicButtonsMap.set(name, btn);
        }

        // Topic button wrapping can change header height.
        syncTopbarOffset();
      }

      function ensureAllIo() {
        if (allIo) return;
        if (!('IntersectionObserver' in window)) return;

        allIo = new IntersectionObserver(
          (entries) => {
            for (const e of entries) {
              if (!e.isIntersecting) continue;
              const item = e.target;
              const file = item?.dataset?.file;
              if (!file) continue;
              const frame = allFrames.get(file);
              if (!frame) continue;
              loadAllFrame(file);
            }
          },
          // In "all pages" mode we use normal browser scrolling, so observe relative to viewport.
          { root: null, rootMargin: '800px 0px' }
        );
      }

      function loadAllFrame(file) {
        const frame = allFrames.get(file);
        if (!frame) return;
        if (allLoaded.has(frame)) return;

        const srcBase = frame.dataset.src;
        if (!srcBase) return;

        const bust = String(Date.now());
        frame.src = `${srcBase}?v=${bust}`;
        allLoaded.add(frame);

        frame.addEventListener(
          'load',
          () => {
            fitA4InFrame(frame, 'all');
            maybeWarnIframeBlocked(frame);

            if (diagConfig.enabled) {
              try {
                const doc = frame.contentDocument;
                const pageEl = doc?.querySelector?.('main.a4-page') || doc?.querySelector?.('.a4-page');
                upsertDiag(diagnosePageEl(file, pageEl));

                // Re-check after MathJax/fonts settle; lightweight by design.
                window.setTimeout(() => {
                  try {
                    const doc2 = frame.contentDocument;
                    const pageEl2 = doc2?.querySelector?.('main.a4-page') || doc2?.querySelector?.('.a4-page');
                    upsertDiag(diagnosePageEl(file, pageEl2));
                  } catch {
                    // ignore
                  }
                }, 900);
              } catch {
                // ignore
              }
            }
          },
          { once: true }
        );
      }

      function highlightAllSelected(selectedFile) {
        for (const [file, el] of allItems.entries()) {
          el.classList.toggle('is-active', file === selectedFile);
        }
      }

      function scrollToAllSelected(selectedFile) {
        const item = allItems.get(selectedFile);
        if (!item) return;
        item.scrollIntoView({ block: 'start' });
      }

      function renderAllPages(selectedFile) {
        // In ALL mode we rely on iframes to render the pages.
        // Keep the fallback visible until the selected page actually loads,
        // otherwise the stage can look like a blank white area on first paint.
        showFallback('טוען…');

        allPages.innerHTML = '';
        allFrames = new Map();
        allItems = new Map();
        allLoaded = new Set();

        if (allIo) {
          try {
            allIo.disconnect();
          } catch {
            // ignore
          }
          allIo = null;
        }

        const frag = document.createDocumentFragment();

        for (const entry of toc.flat) {
          const item = document.createElement('div');
          item.className = 'reader-allItem';
          item.dataset.file = entry.file;

          const frame = document.createElement('iframe');
          frame.className = 'reader-allFrame';
          frame.title = entry.title || entry.file;
          frame.referrerPolicy = 'no-referrer';
          frame.loading = 'lazy';
          // Use per-segment URL encoding so relative assets (e.g. style.css) resolve correctly.
          frame.dataset.src = `/${encodeUrlPath(entry.file)}`;
          item.appendChild(frame);

          frag.appendChild(item);
          allFrames.set(entry.file, frame);
          allItems.set(entry.file, item);
        }

        allPages.appendChild(frag);
        ensureAllIo();

        const selectedFrame = allFrames.get(selectedFile);
        if (selectedFrame) {
          selectedFrame.addEventListener('load', () => hideFallback(), { once: true });
        } else {
          hideFallback();
        }

        if (allIo) {
          for (const item of allItems.values()) allIo.observe(item);
        } else {
          // Fallback: load first few eagerly.
          for (let i = 0; i < Math.min(6, toc.flat.length); i++) {
            const f = toc.flat[i]?.file;
            if (f) loadAllFrame(f);
          }
        }

        highlightAllSelected(selectedFile);
        loadAllFrame(selectedFile);
        scrollToAllSelected(selectedFile);
        updateMetaAll(selectedFile, 'מוכן');
      }

      function renderList(selectedFile) {
        fileSelect.innerHTML = '';
        fileList.innerHTML = '';

        let rightFile = '';
        let leftFile = '';

        if (currentMode === 'all') {
          rightFile = selectedFile || '';
          leftFile = '';
        } else {
          const startIdx = spreadStartIndexForFile(selectedFile);
          const { right, left } = spreadFiles(startIdx);
          rightFile = right?.file || '';
          leftFile = left?.file || '';
        }

        for (const entry of toc.flat) {
          const opt = document.createElement('option');
          opt.value = entry.file;
          opt.textContent = labelForEntry(entry);
          fileSelect.appendChild(opt);
        }

        for (const topic of toc.topics) {
          const section = document.createElement('section');
          section.className = 'reader-topic';

          const title = document.createElement('div');
          title.className = 'reader-topicTitle';
          title.textContent = topic.name;
          section.appendChild(title);

          const list = document.createElement('div');
          list.className = 'reader-topicList';

          for (const entry of topic.pages) {
            const btn = document.createElement('button');
            btn.type = 'button';
            const inSpread = entry.file === rightFile || entry.file === leftFile;
            btn.className =
              'reader-item' +
              (currentMode === 'all'
                ? entry.file === rightFile
                  ? ' is-active'
                  : ''
                : entry.file === rightFile
                  ? ' is-active'
                  : inSpread
                    ? ' is-inSpread'
                    : '');

            if (entry.topic && typeof entry.pageIndex === 'number' && typeof entry.pageTotal === 'number') {
              btn.textContent = `עמוד ${entry.pageIndex} / ${entry.pageTotal}`;
            } else {
              btn.textContent = entry.title || entry.file;
            }

            btn.addEventListener('click', () => {
              openFileInCurrentMode(entry.file, 'נפתח');
              setActiveTopicButtons(getSelectedFile() || entry.file);
            });
            list.appendChild(btn);
          }

          section.appendChild(list);
          fileList.appendChild(section);
        }

        fileSelect.value = rightFile;
        setActiveTopicButtons(rightFile);
        updatePrevNextDisabled();
      }

      async function selectNeighborSpread(deltaSpreads) {
        if (currentMode === 'all') return;
        const current = getSelectedFile();
        const idx = findIndex(current);
        if (idx < 0) return;

        const nextIdx = Math.min(toc.flat.length - 1, Math.max(0, idx + deltaSpreads));
        const file = toc.flat[nextIdx]?.file;
        if (!file) return;

        setSelectedFile(file);
        renderList(file);
        showFallback('טוען…');
        await updateSpread(nextIdx, 'דפדוף');
        hideFallback();
        setActiveTopicButtons(file);
      }

      async function boot() {
        showFallback('טוען…');

        try {
          const res = await fetch('/api/toc', { cache: 'no-store' });
          if (!res.ok) throw new Error(`TOC HTTP ${res.status}`);

          const data = await res.json();
          toc = {
            topics: Array.isArray(data.topics) ? data.topics : [],
            flat: Array.isArray(data.flat) ? data.flat : [],
            buttonTopics: Array.isArray(data.buttonTopics) ? data.buttonTopics : []
          };

          if (diagConfig.enabled) {
            diagByFile.clear();
            flushDiagReport();
          }

          const preferred = getSelectedFile();

          let last = '';
          try {
            last = window.localStorage.getItem('reader:lastFile') || '';
          } catch {
            // ignore
          }

          const exists = (f) => toc.flat.some((p) => p.file === f);
          const initial = exists(preferred) ? preferred : exists(last) ? last : toc.flat[0]?.file || '';

          if (!initial) {
            showFallback('לא נמצאו קבצי HTML להצגה.');
            return;
          }

        const mode = getMode();
        setModeUi(mode);
        buildTopicButtons();

        if (mode === 'all') {
          // keep exact selected file for scrolling/highlight
          setMode('all');
          setSelectedFile(initial);
          renderList(initial);
          renderAllPages(initial);
          setActiveTopicButtons(initial);
        } else {
          setMode('book');
          const startIdx = spreadStartIndexForFile(initial);
          const rightFile = toc.flat[startIdx]?.file || initial;
          setSelectedFile(rightFile);
          renderList(rightFile);
          await updateSpread(startIdx, 'מוכן');
          hideFallback();
          setActiveTopicButtons(rightFile);
        }

        modeAllBtn.addEventListener('click', () => {
          if (currentMode === 'all') return;
          setMode('all');
          setModeUi('all');
          showFallback('טוען…');
          const f = getSelectedFile() || toc.flat[0]?.file || '';
          if (!f) return;
          setSelectedFile(f);
          renderList(f);
          renderAllPages(f);
        });

        modeBookBtn.addEventListener('click', () => {
          if (currentMode === 'book') return;
          setMode('book');
          setModeUi('book');
          showFallback('טוען…');
          const f = getSelectedFile() || toc.flat[0]?.file || '';
          if (!f) return;
          const startIdx = spreadStartIndexForFile(f);
          const rightFile = toc.flat[startIdx]?.file || f;
          setSelectedFile(rightFile);
          renderList(rightFile);
          updateSpread(startIdx, 'נפתח').then(() => hideFallback());
          setActiveTopicButtons(rightFile);
        });

        fileSelect.addEventListener('change', () => {
          const f = fileSelect.value;
          openFileInCurrentMode(f, 'נבחר');
          setActiveTopicButtons(getSelectedFile() || f);
        });

        prevBtn.addEventListener('click', () => void selectNeighbor(-1));
        nextBtn.addEventListener('click', () => void selectNeighbor(1));

        window.addEventListener('keydown', (e) => {
          const tag = e.target?.tagName;
          if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
          // RTL-friendly: Left = forward, Right = back
          if (e.key === 'ArrowLeft' || e.key === 'PageDown') void selectNeighbor(1);
          if (e.key === 'ArrowRight' || e.key === 'PageUp') void selectNeighbor(-1);
        });

        const es = new EventSource('/events');
        es.addEventListener('reload', () => {
          const currentFile = getSelectedFile();
          if (currentMode === 'all') {
            // Reload only already-loaded frames.
            const bust = String(Date.now());
            for (const frame of allLoaded) {
              const srcBase = frame.dataset.src;
              if (!srcBase) continue;
              frame.src = `${srcBase}?v=${bust}`;
            }
            if (currentFile) updateMetaAll(currentFile, 'עודכן');
            if (diagConfig.enabled) flushDiagReport();
            return;
          }

          if (!currentFile) return;
          const start = spreadStartIndexForFile(currentFile);
          updateSpread(start, 'עודכן');

          if (diagConfig.enabled) flushDiagReport();
        });

        // Book mode uses direct DOM injection (no iframe). We still fit on resize.

        if (window.ResizeObserver && frameWrap) {
          const ro = new ResizeObserver(() => {
            if (currentMode === 'all') {
              for (const frame of allLoaded) fitA4InFrame(frame, 'all');
              return;
            }

            fitA4InHost(pageRight);
          });
          ro.observe(frameWrap);
        } else {
          window.addEventListener('resize', () => {
            if (currentMode === 'all') {
              for (const frame of allLoaded) fitA4InFrame(frame, 'all');
              return;
            }

            fitA4InHost(pageRight);
            if (!pageLeft.hidden) fitA4InHost(pageLeft);
          });
        }
        } catch (err) {
          const message = err instanceof Error ? err.message : String(err);
          showFallback('לא ניתן לטעון את התצוגה המקדימה.', message);
        }
      }

      boot();
    </script>
  </body>
</html>
