<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>גרף עולה, יורד או קבוע</title>
  <link rel="stylesheet" href="style.css" />
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-badge" aria-label="מספר עמוד">3</div>

    <header class="header">
      <h1 class="title">גרף עולה, יורד או קבוע</h1>
    </header>

    <section class="section" aria-label="שאלה 3">
      <p class="instruction">
        <span class="bullet" aria-hidden="true"></span>
        <span>קבעו האם כל אחד מהגרפים הבאים עולה/יורד או קבוע:</span>
      </p>

      <div class="q3a-layout" aria-label="גרף עם 6 ישרים">
        <div class="answerlist" aria-label="תשובות a-f">
          <div class="answers-grid" aria-label="תיבות תשובה a-f">
            <div class="answeritem"><div class="answerkey">a:</div><div class="answer-box mini" aria-hidden="true"></div></div>
            <div class="answeritem"><div class="answerkey">b:</div><div class="answer-box mini" aria-hidden="true"></div></div>
            <div class="answeritem"><div class="answerkey">c:</div><div class="answer-box mini" aria-hidden="true"></div></div>
            <div class="answeritem"><div class="answerkey">d:</div><div class="answer-box mini" aria-hidden="true"></div></div>
            <div class="answeritem"><div class="answerkey">e:</div><div class="answer-box mini" aria-hidden="true"></div></div>
            <div class="answeritem"><div class="answerkey">f:</div><div class="answer-box mini" aria-hidden="true"></div></div>
          </div>
        </div>

        <div class="q3a-graph" aria-label="תרשים a-f">
          <svg viewBox="0 0 520 300" width="100%" height="100%" role="img" aria-label="מערכת צירים עם שישה ישרים">
            <defs>
              <marker id="arrow3a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
                <path d="M0,0 L12,6 L0,12 Z" fill="currentColor" />
              </marker>
            </defs>

            <!-- axes -->
            <line class="axis" x1="250" y1="270" x2="250" y2="20" marker-end="url(#arrow3a)" />
            <line class="axis" x1="70" y1="170" x2="500" y2="170" marker-end="url(#arrow3a)" />
            <text x="240" y="20" dominant-baseline="hanging"><tspan font-style="italic">y</tspan></text>
            <text x="505" y="178" dominant-baseline="hanging"><tspan font-style="italic">x</tspan></text>

            <!-- lines (a-f) -->
            <line class="graph-line light" x1="110" y1="220" x2="360" y2="40" />
            <text class="linelabel" x="368" y="44">(a)</text>

            <line class="graph-line light" x1="410" y1="40" x2="410" y2="280" />
            <text class="linelabel" x="420" y="54">(b)</text>

            <line class="graph-line light" x1="160" y1="150" x2="310" y2="290" />
            <text class="linelabel" x="318" y="290" dominant-baseline="alphabetic">(c)</text>

            <line class="graph-line light" x1="90" y1="260" x2="470" y2="160" />
            <text class="linelabel" x="74" y="268">(d)</text>

            <line class="graph-line light" x1="90" y1="80" x2="470" y2="150" />
            <text class="linelabel" x="74" y="72">(e)</text>

            <line class="graph-line light" x1="110" y1="255" x2="470" y2="255" />
            <text class="linelabel" x="92" y="248">(f)</text>
          </svg>
        </div>
      </div>

      <p class="subprompt">
        השלימו: רק הישר <span class="blank" aria-hidden="true"></span> מקביל לציר <span class="blank small" aria-hidden="true"></span>.
      </p>
    </section>

    <section class="section" aria-label="שאלה 4">
      <p class="instruction">
        <span class="bullet" aria-hidden="true"></span>
        <span>סרטטו גרף שעובר בנקודה A ועובר בנקודה (0,5)</span>
      </p>

      <div class="q3b-graph" aria-label="מערכת צירים עם רשת ונקודות">
        <svg viewBox="0 0 360 360" width="100%" height="100%" role="img" aria-label="מערכת צירים עם רשת">
          <defs>
            <marker id="arrow3b" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L12,6 L0,12 Z" fill="currentColor" />
            </marker>

            <pattern id="grid3b" width="15" height="15" patternUnits="userSpaceOnUse">
              <path d="M15 0H0V15" fill="none" class="grid-line" />
            </pattern>
          </defs>

          <rect x="30" y="30" width="300" height="300" fill="url(#grid3b)" aria-hidden="true" />

          <!-- axes -->
          <line class="axis" x1="180" y1="330" x2="180" y2="18" marker-end="url(#arrow3b)" />
          <line class="axis" x1="30" y1="180" x2="342" y2="180" marker-end="url(#arrow3b)" />
          <text x="170" y="18" dominant-baseline="hanging"><tspan font-style="italic">y</tspan></text>
          <text x="345" y="188" dominant-baseline="hanging"><tspan font-style="italic">x</tspan></text>

          <!-- points: A(-2,1) and (0,5) -->
          <circle class="point" cx="150" cy="165" r="2" />
          <text x="138" y="152">A</text>
          <circle class="point" cx="180" cy="105" r="2" />
        </svg>
      </div>

      <div class="q3b-answers" aria-label="שאלות המשך">
        <div class="q3b-line">
          <div>האם הגרף עולה או יורד?</div>
          <div class="answer-box mini" aria-hidden="true"></div>
        </div>
        <div class="q3b-line">
          <div>האם השיפוע חיובי או שלילי?</div>
          <div class="answer-box mini" aria-hidden="true"></div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
