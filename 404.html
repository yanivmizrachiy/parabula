<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Redirect</title>
</head>
<body style="font-family:Heebo,Assistant,Arial,sans-serif;background:#0b1220;color:#eaf0ff;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="max-width:720px;padding:24px;">
    <div style="font-size:22px;font-weight:800;margin-bottom:10px;">מנתב אותך…</div>
    <div id="msg" style="opacity:.85">מחפש יעד מתאים לקישור…</div>
  </div>

<script>
(async ()=>{
  try{
    const path = location.pathname;
    const r = await fetch('/redirects.json', {cache:'no-store'});
    if(!r.ok) throw new Error('redirects.json not found');
    const data = await r.json();
    const map = (data && data.map) ? data.map : {};
    const target = map[path] || map[path.replace(/\/$/,'')] || map[path + '/'] || null;

    if(target){
      document.getElementById('msg').textContent = 'מעביר ל: ' + target;
      location.replace(target);
      return;
    }
    document.getElementById('msg').textContent = 'לא נמצא ניתוב לקישור הזה. חזור למסך הראשי.';
    setTimeout(()=>location.replace('/preview/reader.html'), 1200);
  }catch(e){
    document.getElementById('msg').textContent = 'שגיאה בטעינת ניתובים. חזור למסך הראשי.';
    setTimeout(()=>location.replace('/preview/reader.html'), 1200);
  }
})();
</script>
</body>
</html>
