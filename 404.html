<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Redirect</title>
  <link rel="stylesheet" href="/preview/redirect.css"/>
</head>
<body>
  <div class="wrap">
    <div class="h">מנתב אותך…</div>
    <div id="msg" class="msg">מחפש יעד מתאים לקישור…</div>
  </div>

<script>
(async ()=>{
  try{
    const path = location.pathname;
    const r = await fetch('/redirects.json', {cache:'no-store'});
    if(!r.ok) throw new Error('redirects.json not found');
    const data = await r.json();
    const map = (data && data.map) ? data.map : {};
    const target = map[path] || map[path.replace(/\/$/,'')] || map[path + '/'] || null;

    if(target){
      document.getElementById('msg').textContent = 'מעביר ל: ' + target;
      location.replace(target);
      return;
    }
    document.getElementById('msg').textContent = 'לא נמצא ניתוב לקישור הזה. חוזר למסך הראשי…';
    setTimeout(()=>location.replace('/preview'), 1200);
  }catch(e){
    document.getElementById('msg').textContent = 'שגיאה בטעינת ניתובים. חוזר למסך הראשי…';
    setTimeout(()=>location.replace('/preview'), 1200);
  }
})();
</script>
</body>
</html>
